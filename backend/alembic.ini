# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic database migration configuration for ReviewSnipper.
#
# Alembic detects changes to models.py and generates SQL migration scripts.
# Each migration is a versioned file stored in alembic/versions/.
#
# Common commands:
#   Generate a new migration after changing models.py:
#     alembic revision --autogenerate -m "add_users_table"
#
#   Apply all pending migrations to the database:
#     alembic upgrade head
#
#   Roll back the last migration:
#     alembic downgrade -1
#
#   See current migration status:
#     alembic current
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to the migration scripts folder
script_location = alembic

# Template for naming new migration files
# Produces filenames like: 20240315_1430_add_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# The database URL is read from the environment variable DATABASE_URL
# in alembic/env.py — not hardcoded here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
